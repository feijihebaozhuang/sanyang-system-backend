# 三羊系统 Docker 部署
# 用法见 deploy-docker.sh
#
# network_mode: host — 容器与宿主机共用网络，.env 里 MYSQL_HOST=127.0.0.1 才能连宿主机 MySQL。
# （bridge 模式下 127.0.0.1 指向容器自身，会连不上库。）
# host 模式下 ports 映射无效，应用直接监听宿主机 3001 / 3002。
# 仅 Linux 服务器适用；Docker Desktop (Win/Mac) 不支持 host 网络。

services:
  cs:
    build: .
    image: sanyang-system:latest
    container_name: sanyang-cs
    restart: unless-stopped
    network_mode: host
    working_dir: /app
    command: ["python", "app_cs.py"]
    env_file:
      - .env
    volumes:
      - ./data:/app/data:ro
      - ./.env:/app/.env:ro
      - ./data.json:/app/data.json
      - ./quote_data.json:/app/quote_data.json
      - ./shop_config.json:/app/shop_config.json
      - ./km_token.json:/app/km_token.json
      - ./alibaba_shops.json:/app/alibaba_shops.json
      - ./orders_cache.json:/app/orders_cache.json:ro
      - ./index_cs.html:/app/index_cs.html
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:3001/api/webhook/kuaimai')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  prod:
    build: .
    image: sanyang-system:latest
    container_name: sanyang-prod
    restart: unless-stopped
    network_mode: host
    working_dir: /app
    command: ["python", "app_production.py"]
    env_file:
      - .env
    volumes:
      - ./data:/app/data:ro
      - ./.env:/app/.env:ro
      - ./data.json:/app/data.json
      - ./quote_data.json:/app/quote_data.json
      - ./shop_config.json:/app/shop_config.json
      - ./km_token.json:/app/km_token.json
      - ./alibaba_shops.json:/app/alibaba_shops.json
      - ./orders_cache.json:/app/orders_cache.json:ro
      - ./index.html:/app/index.html
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:3002/api/webhook/kuaimai')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
