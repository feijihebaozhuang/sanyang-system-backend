<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<title>三羊管理后台 · 登录</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { min-height: 100vh; display: flex; align-items: center; justify-content: center;
  font-family: -apple-system, "PingFang SC", sans-serif; background: linear-gradient(135deg, #1a5276, #2980b9); }
.box { background: #fff; padding: 36px 40px; border-radius: 12px; width: 360px; box-shadow: 0 8px 32px rgba(0,0,0,.15); }
h1 { font-size: 20px; color: #1a5276; margin-bottom: 24px; text-align: center; }
input { width: 100%; padding: 10px 12px; margin-bottom: 12px; border: 1px solid #d9d9d9; border-radius: 6px; font-size: 14px; }
button { width: 100%; padding: 11px; background: #2980b9; color: #fff; border: none; border-radius: 6px; font-size: 15px; cursor: pointer; }
button:hover { background: #1a5276; }
.err { color: #e74c3c; font-size: 13px; margin-top: 10px; min-height: 18px; text-align: center; }
</style>
</head>
<body>
<div class="box">
  <h1>三羊统一管理后台</h1>
  <form method="POST" action="/guanli/login/submit" accept-charset="UTF-8">
    <input name="username" placeholder="账号" autocomplete="username" required>
    <input name="password" type="password" placeholder="密码" autocomplete="current-password" required>
    <button type="submit">登录</button>
  </form>
  <div id="msg" class="err"></div>
</div>
<script>
(function () {
  var err = (new URLSearchParams(location.search)).get('error');
  var el = document.getElementById('msg');
  var map = {
    empty: '请输入账号和密码',
    auth: '账号或密码错误',
    server: '服务暂不可用，请稍后重试'
  };
  if (err && map[err]) el.textContent = map[err];
})();
</script>
</body>
</html>
