<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<title>三羊管理后台 · 登录</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { min-height: 100vh; display: flex; align-items: center; justify-content: center;
  font-family: -apple-system, "PingFang SC", sans-serif; background: linear-gradient(135deg, #1a5276, #2980b9); }
.box { background: #fff; padding: 36px 40px; border-radius: 12px; width: 400px; box-shadow: 0 8px 32px rgba(0,0,0,.15); }
h1 { font-size: 20px; color: #1a5276; margin-bottom: 6px; }
p { font-size: 13px; color: #888; margin-bottom: 16px; line-height: 1.6; }
input { width: 100%; padding: 10px 12px; margin-bottom: 12px; border: 1px solid #d9d9d9; border-radius: 6px; font-size: 14px; }
button { width: 100%; padding: 11px; background: #2980b9; color: #fff; border: none; border-radius: 6px; font-size: 15px; cursor: pointer; }
button:hover { background: #1a5276; }
.err { color: #e74c3c; font-size: 13px; margin-top: 10px; min-height: 18px; }
.warn { background: #fff3cd; color: #856404; padding: 10px 12px; border-radius: 6px; font-size: 12px; margin-bottom: 14px; line-height: 1.5; }
</style>
</head>
<body>
<div class="box">
  <h1>三羊统一管理后台（3003）</h1>
  <p>请用本页登录，<strong>不要用 guanli.feijihe.top</strong>（该域名证书已坏）。</p>
  <div class="warn">账号：<strong>admin</strong>　密码：<strong>admin888</strong><br>（与 zean/feijihe 客服账号不是同一套）</div>
  <form method="POST" action="/guanli/login/submit" accept-charset="UTF-8">
    <input name="username" placeholder="账号" autocomplete="username" value="admin" required>
    <input name="password" type="password" placeholder="密码" autocomplete="current-password" required>
    <button type="submit">登录</button>
  </form>
  <div id="msg" class="err"></div>
</div>
<script>
(function () {
  var host = (location.hostname || '').toLowerCase();
  if (host === 'guanli.feijihe.top' || host === 'www.guanli.feijihe.top') {
    location.replace('https://feijihe.top/guanli/login');
    return;
  }
  var err = (new URLSearchParams(location.search)).get('error');
  var el = document.getElementById('msg');
  var map = {
    empty: '请输入账号和密码',
    auth: '账号或密码错误（3003 请用 admin / admin888）',
    server: '3003 服务不可用，请在服务器执行 ensure_guanli_login_87.sh'
  };
  if (err && map[err]) el.textContent = map[err];
})();
</script>
</body>
</html>
