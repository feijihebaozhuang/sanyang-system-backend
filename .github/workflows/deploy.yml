name: 自动部署到服务器

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    name: 部署三羊系统
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 通过 SSH 部署到服务器
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e
            echo "===== 开始自动部署 ====="
            cd /www/feijihe/repo
            git fetch origin
            git checkout main
            git pull origin main
            echo "代码已更新，执行部署脚本..."
            bash deploy.sh stable
            echo "===== 自动部署完成 ====="
