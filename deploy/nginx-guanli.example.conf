# 示例：/etc/nginx/conf.d/guanli.conf
# 87 上若已在 location / 写 allow 14.120.52.215; deny all;
# 必须把下面 include 放在该 location / 之前。

server {
    listen 443 ssl http2;
    server_name guanli.feijihe.top;

    ssl_certificate     /path/to/guanli.fullchain.pem;
    ssl_certificate_key /path/to/guanli.privkey.pem;

    # ① API + 静态：不走 IP 白名单（登录、健康检查、静态）
    include /www/feijihe/repo/deploy/nginx-guanli-api-static.conf.include;

    # ② 首页 HTML：可保留 IP 限制（按需）
    location / {
        allow 14.120.52.215;
        deny all;

        proxy_pass http://127.0.0.1:3003;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }
}
