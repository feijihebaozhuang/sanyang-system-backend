# 示例：/etc/nginx/conf.d/zean.feijihe.top.conf
# 87 上若 zean「拒绝连接」，检查：1) 本文件是否存在 2) 443 listen 3) 安全组 80/443 4) 3001 进程

server {
    listen 80;
    server_name zean.feijihe.top;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name zean.feijihe.top;

    # 证书路径按实际 certbot/阿里云填写
    ssl_certificate     /etc/nginx/ssl/feijihe.top/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/feijihe.top/privkey.pem;

    include /www/feijihe/repo/deploy/nginx-zean-api.conf.include;
}
