<script>
/* 内联 auth_session.js：guanli Nginx IP 白名单会拦 /static/，导致 SY_AUTH 未定义、登录无反应 */
(function (global) {
    const ROUTE_KEY = 'sanyang_ui_route';
    const AUTH_USER_KEY = 'sanyang_auth_user';
    const AUTH_TOKEN_KEY = 'sanyang_auth_token';
    function storageGet(key) {
        try { var v = localStorage.getItem(key); if (v) return v; } catch (e) {}
        try { return sessionStorage.getItem(key); } catch (e) {}
        return null;
    }
    function storageSet(key, value) {
        try { localStorage.setItem(key, value); } catch (e) {}
        try { sessionStorage.setItem(key, value); } catch (e) {}
    }
    function storageRemove(key) {
        try { localStorage.removeItem(key); } catch (e) {}
        try { sessionStorage.removeItem(key); } catch (e) {}
    }
    function readCookie(name) {
        try {
            var m = document.cookie.match(new RegExp('(?:^|; )' + name.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + '=([^;]*)'));
            return m ? decodeURIComponent(m[1]) : null;
        } catch (e) { return null; }
    }
    function readAuthCredentials() {
        var u = readCookie(AUTH_USER_KEY) || storageGet(AUTH_USER_KEY);
        var t = readCookie(AUTH_TOKEN_KEY) || storageGet(AUTH_TOKEN_KEY);
        if (u && t) return { user: u, token: t };
        return null;
    }
    function applyAuthHeaders(headers) {
        var h = Object.assign({}, headers || {});
        var cred = readAuthCredentials();
        if (cred) {
            h['X-Sanyang-User'] = cred.user;
            h['X-Sanyang-Token'] = cred.token;
        }
        return h;
    }
    function saveAuthCredentials(user, token) {
        if (!user) return;
        storageSet(AUTH_USER_KEY, user);
        if (token) storageSet(AUTH_TOKEN_KEY, token);
        try {
            var secure = location.protocol === 'https:';
            document.cookie = AUTH_USER_KEY + '=' + encodeURIComponent(user) + '; path=/; max-age=' + (86400 * 31) + '; samesite=lax' + (secure ? '; secure' : '');
            if (token) document.cookie = AUTH_TOKEN_KEY + '=' + encodeURIComponent(token) + '; path=/; max-age=' + (86400 * 31) + '; samesite=lax' + (secure ? '; secure' : '');
        } catch (e) {}
    }
    function clearAuthCredentials() {
        storageRemove(AUTH_USER_KEY);
        storageRemove(AUTH_TOKEN_KEY);
    }
    function saveRoute(top, sub) {
        var route = { top: top || 'main', sub: sub || null };
        try { sessionStorage.setItem(ROUTE_KEY, JSON.stringify(route)); } catch (e) {}
        var hash = sub ? '#page=' + encodeURIComponent(top) + '&sub=' + encodeURIComponent(sub)
            : '#page=' + encodeURIComponent(top);
        if (location.hash !== hash) {
            history.replaceState(null, '', location.pathname + location.search + hash);
        }
    }
    function readRoute() {
        var raw = (location.hash || '').replace(/^#/, '');
        if (raw) {
            var p = new URLSearchParams(raw);
            var page = p.get('page');
            if (page) return { top: page, sub: p.get('sub') || null };
        }
        try {
            var r = JSON.parse(sessionStorage.getItem(ROUTE_KEY) || '{}');
            if (r.top) return { top: r.top, sub: r.sub || null };
        } catch (e) {}
        return { top: 'main', sub: null };
    }
    function clearRoute() {
        try { sessionStorage.removeItem(ROUTE_KEY); } catch (e) {}
        if (location.hash) history.replaceState(null, '', location.pathname + location.search);
    }
    function isApiPath(path) {
        if (!path) return false;
        if (path.indexOf('/api/') === 0) return true;
        if (path.indexOf('https://feijihe.top/api/co/') === 0) return true;
        if (global.location && path.indexOf(global.location.origin + '/api/') === 0) return true;
        return false;
    }
    function coApiRoot() {
        var host = (global.location && global.location.hostname) || '';
        var path = (global.location && global.location.pathname) || '';
        if (path.indexOf('/guanli') === 0) return '/api/co';
        if (host.indexOf('guanli') >= 0) return 'https://feijihe.top/api/co';
        return '/api';
    }
    function loginApiCandidates(path) {
        path = path || '/api/login';
        var host = (global.location && global.location.hostname) || '';
        var list = [];
        if (host.indexOf('guanli') >= 0) {
            list.push('https://feijihe.top/api/co/login');
            list.push('/api/login');
        }
        var resolved = resolveCoApiUrl(path);
        if (list.indexOf(resolved) < 0) list.push(resolved);
        return list;
    }
    function parseLoginResponse(res) {
        return res.text().then(function(text) {
            var t = (text || '').trim();
            if (t.charAt(0) === '<') {
                throw new Error('登录接口返回了网页而非 JSON（Nginx 可能未放行 /api/，请联系管理员执行 patch_guanli_nginx）');
            }
            var d = {};
            try { d = JSON.parse(t || '{}'); } catch (e) {
                throw new Error('登录响应格式错误');
            }
            return { ok: res.ok, status: res.status, data: d };
        });
    }
    function resolveCoApiUrl(url) {
        if (!url || url.indexOf('http') === 0) return url;
        var root = coApiRoot();
        if (root === '/api') return url;
        if (url === root || url.indexOf(root + '/') === 0) return url;
        if (url.indexOf('/api/') === 0) return root + url.substring(4);
        return url;
    }
    function apiFetch(url, options) {
        url = resolveCoApiUrl(url);
        var cross = url.indexOf('http') === 0 && global.location && url.indexOf(global.location.origin) !== 0;
        var opts = Object.assign({ credentials: cross ? 'omit' : 'same-origin' }, options || {});
        opts.headers = applyAuthHeaders(opts.headers);
        if (!opts.headers['Content-Type'] && opts.method && opts.method.toUpperCase() === 'POST') {
            opts.headers['Content-Type'] = 'application/json';
        }
        if (opts.body === undefined && opts.method && opts.method.toUpperCase() === 'POST') {
            opts.body = '{}';
        }
        return global.fetch(url, opts);
    }
    global.SY_AUTH = {
        saveRoute: saveRoute,
        readRoute: readRoute,
        clearRoute: clearRoute,
        apiFetch: apiFetch,
        saveAuthCredentials: saveAuthCredentials,
        clearAuthCredentials: clearAuthCredentials,
        readAuthCredentials: readAuthCredentials,
        loginApiCandidates: loginApiCandidates,
        parseLoginResponse: parseLoginResponse,
        coApiRoot: coApiRoot,
        resolveCoApiUrl: resolveCoApiUrl
    };
})(window);
</script>

  <div class="login-box">

<script>
var currentUser = null;
var currentPage = 'dashboard';
var csStaffCache = [];
var categoriesCache = [];
var customersCache = [];
var embedIframes = {};
var selectedRoleForEdit = 0;

var EMBED_URLS = {
  embed_cs: 'https://zean.feijihe.top/',
  embed_prod: 'https://feijihe.top/'
};
var EMBED_OPEN_URLS = {
  embed_cs: 'https://zean.feijihe.top/',
  embed_prod: 'https://feijihe.top/'
};

var STATUS_LABELS = {
  draft: '草稿', pending_review: '待审核', pending_payment: '待付款', paid: '已付款',
  approved: '已通过', rejected: '已驳回', in_production: '生产中', completed: '已完成', cancelled: '已取消'
};
var orderFilters = { status: '', cs_staff_id: '', customer_id: '', keyword: '', date_from: '', date_to: '', cs_include_unassigned: false };
var PERM_FEATURES_FALLBACK = [
  '首页', '订单生产进度', '扫码报工', '日报表', '数据看板', '刀模', '刀模库',
  '库存', '原材料', '快麦ERP', '员工', '权限管理', '报价', '实时订单'
];
var DEFAULT_POSITION_NAMES = ['超级管理员', '主管', '管理', '客服', '员工', '财务', '业务员'];
var editingEmpOldName = '';

function permFeaturesList() {
  return (window._permFeatures && window._permFeatures.length) ? window._permFeatures : PERM_FEATURES_FALLBACK;
}

function normalizePositionNames(arr) {
  var out = [];
  (arr || []).forEach(function(p) {
    var n = (typeof p === 'string') ? p.trim() : (p && (p.name || p.label) ? String(p.name || p.label).trim() : '');
    if (n && out.indexOf(n) < 0) out.push(n);
  });
  return out.length ? out : DEFAULT_POSITION_NAMES.slice();
}

function toast(msg) {
  var el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(function() { el.classList.remove('show'); }, 2500);
}

function apiFetch(url, opts) {
  if (!globalThis.SY_AUTH || !SY_AUTH.apiFetch) {
    return Promise.reject(new Error('页面脚本未加载完整，请 Ctrl+F5 强制刷新'));
  }
  return SY_AUTH.apiFetch(url, opts || {}).then(function(r) {
    return r.text().then(function(text) {
      var trimmed = (text || '').trim();
      if (trimmed.startsWith('<')) {
        throw new Error('接口返回异常（HTTP ' + r.status + '）');
      }
      var d = {};
      try { d = trimmed ? JSON.parse(text) : {}; } catch (e) {
        throw new Error('接口响应不是 JSON（HTTP ' + r.status + '）');
      }
      if (r.status === 401 && url.indexOf('/api/me') < 0) showLogin();
      if (!r.ok && d && !d.success && (d.error || d.message)) {
        throw new Error(d.error || d.message);
      }
      return d;
    });
  });
}

function showLogin() {
  document.getElementById('loginPage').classList.remove('hidden');
  document.getElementById('appShell').classList.add('hidden');
}

function showApp() {
  document.getElementById('loginPage').classList.add('hidden');
  document.getElementById('appShell').classList.remove('hidden');
  document.getElementById('userLabel').textContent =
    (currentUser.display_name || currentUser.username) + ' · ' + (currentUser.role === 'admin' ? '管理员' : '只读');
  document.getElementById('navPermissions').classList.toggle('hidden', currentUser.role !== 'admin');
  document.getElementById('navRoute').style.display = currentUser.role === 'admin' ? '' : 'none';
  document.getElementById('navReport').style.display = currentUser.role === 'admin' ? '' : 'none';
  document.getElementById('navWorkorder').style.display = currentUser.role === 'admin' ? '' : 'none';
}

function doLogin() {
  var u = document.getElementById('loginUser').value.trim();
  var p = document.getElementById('loginPwd').value;
  var errEl = document.getElementById('loginErr');
  var btn = document.querySelector('#loginPage button');
  errEl.textContent = '';
  if (!globalThis.SY_AUTH) {
    errEl.textContent = '页面加载失败，请刷新后重试';
    return;
  }
  SY_AUTH.clearAuthCredentials();
  if (btn) btn.disabled = true;
  errEl.textContent = '正在登录…';
  var url = SY_AUTH.resolveCoApiUrl('/api/login');
  SY_AUTH.apiFetch('/api/login', {
    method: 'POST',
    body: JSON.stringify({ username: u, password: p })
  }).then(function(res) { return SY_AUTH.parseLoginResponse(res); })
    .then(function(r) {
      var d = r.data || {};
      if (!r.ok || !d.success || !d.user) {
        throw new Error(d.message || d.error || ('登录失败 HTTP ' + r.status));
      }
      SY_AUTH.saveAuthCredentials(d.user.username, d.user.auth_token);
      errEl.textContent = '登录成功…';
      location.reload();
    })
    .catch(function(e) {
      errEl.textContent = e.message || '登录失败';
      if (btn) btn.disabled = false;
    });
}

function doLogout() {
  apiFetch('/api/logout', { method: 'POST' }).finally(function() {
    SY_AUTH.clearAuthCredentials();
    currentUser = null;
    showLogin();
  });
}

function switchPage(page) {
  currentPage = page;
  document.querySelectorAll('.nav button[data-page]').forEach(function(b) {
    b.classList.toggle('active', b.getAttribute('data-page') === page);
  });
  SY_AUTH.saveRoute(page, null);
  var isEmbed = page === 'embed_cs' || page === 'embed_prod';
  document.getElementById('mainContent').className = isEmbed ? 'main embed-mode' : 'main';
  var loaders = {
    dashboard: loadDashboard,
    categories: loadCategories,
    customers: loadCustomers,
    orders: loadOrders,
    sku_lookup: loadSkuLookup,
    platform_products: loadPlatformProducts,
    cs_staff: loadCsStaff,
    permissions: loadPermissions,
    embed_cs: loadEmbedCs,
    embed_prod: loadEmbedProd,
    route: loadRoute,
    report: loadReport,
    workorder: loadWorkorder
  };
  (loaders[page] || loadDashboard)();
}

function loadEmbedFrame(page, title) {
  var url = EMBED_URLS[page];
  var openUrl = EMBED_OPEN_URLS[page] || url;
  document.getElementById('mainContent').innerHTML =
    '<div class="embed-toolbar"><span><strong>' + esc(title) + '</strong></span>' +

    delete embedIframes[page];

  ifr.title = title;

function fetchRouteData() {
  document.getElementById('routeLoading').style.display = '';
  document.getElementById('routeMain').style.display = 'none';
  // 同时加载路由数据和生产线流程（获取工序列表）
  Promise.all([
    apiFetch('/api/perm/route_data'),
    apiFetch('/api/perm/data')
  ]).then(function(results) {
    var data = results[0];
    var permData = results[1];
    if (data.success) {
      _routeData.employee_step_whitelist = data.employee_step_whitelist || {};
      _routeData.order_routes = data.order_routes || [];
      // 保存生产线流程，供产线模板下拉使用
      _routeData.permProcesses = (permData.data || {}).processes || [];
      // 从生产线流程提取所有工序名
      _routeData.allSteps = [];
      var processes = _routeData.permProcesses;
      processes.forEach(function(dept) {
        (dept.steps || []).forEach(function(step) {
          if (step.name && _routeData.allSteps.indexOf(step.name) < 0) {
            _routeData.allSteps.push(step.name);
          }
        });
      });
      document.getElementById('routeLoading').style.display = 'none';
      document.getElementById('routeMain').style.display = '';
      renderEmpStepList();
      renderOrderRuleList();
    }
  }).catch(function(e) {
    document.getElementById('routeLoading').textContent = '❌ 加载失败：' + e.message;
  });
}

function renderEmpStepList() {
  var map = _routeData.employee_step_whitelist;
  var names = Object.keys(map);
  var allSteps = _routeData.allSteps || [];
  var html = '<table style="width:100%;border-collapse:collapse;font-size:13px;"><thead><tr style="background:#f5f5f5;"><th style="padding:8px;border:1px solid #e0e0e0;text-align:left;width:100px;">员工</th><th style="padding:8px;border:1px solid #e0e0e0;text-align:left;">可报工序（勾选，从生产线流程同步）</th><th style="padding:8px;border:1px solid #e0e0e0;width:60px;">操作</th></tr></thead><tbody>';
  names.forEach(function(name) {
    var selected = map[name] || [];
    html += '<tr><td style="padding:8px;border:1px solid #e0e0e0;font-weight:500;">' + esc(name) + '</td>' +
      '<td style="padding:8px;border:1px solid #e0e0e0;"><div style="display:flex;flex-wrap:wrap;gap:4px;max-height:120px;overflow-y:auto;">';
    if (allSteps.length === 0) {
      html += '<span style="color:#999;font-size:12px;">暂无工序，请先在「生产线流程」中添加工序</span>';
    } else {
      allSteps.forEach(function(step) {
        var checked = selected.indexOf(step) !== -1 ? 'checked' : '';
        html += '<label style="font-size:12px;cursor:pointer;white-space:nowrap;padding:2px 0;margin-right:6px;">' +
          '<input type="checkbox" class="route-emp-step" data-name="' + escAttr(name) + '" data-step="' + escAttr(step) + '" ' + checked + ' onchange="toggleEmpStep(this)"> ' +
          esc(step) + '</label>';
      });
    }
    html += '</div></td>' +
      '<td style="padding:8px;border:1px solid #e0e0e0;"><button onclick="removeEmpStepRule(\'' + escAttr(name) + '\')" style="padding:3px 10px;background:#ff4d4f;color:#fff;border:none;border-radius:4px;cursor:pointer;font-size:12px;">删</button></td></tr>';
  });
  html += '</tbody></table>';
  document.getElementById('empStepList').innerHTML = html;
}

function toggleEmpStep(el) {
  var name = el.getAttribute('data-name');
  var step = el.getAttribute('data-step');
  var list = _routeData.employee_step_whitelist[name] || [];
  if (el.checked) {
    if (list.indexOf(step) < 0) list.push(step);
  } else {
    var idx = list.indexOf(step);
    if (idx >= 0) list.splice(idx, 1);
  }
  _routeData.employee_step_whitelist[name] = list;
}

function addEmpStepRule() {
  var name = prompt('输入员工姓名：');
  if (!name || !name.trim()) return;
  _routeData.employee_step_whitelist[name.trim()] = [];
  renderEmpStepList();
}

function removeEmpStepRule(name) {
  delete _routeData.employee_step_whitelist[name];
  renderEmpStepList();
}

function saveRouteConfig() {
  // 白名单数据已由复选框 onchange 实时同步，无需额外收集
  // Collect order rules from inputs
  document.querySelectorAll('.route-rule-name').forEach(function(inp) {
    var idx = parseInt(inp.getAttribute('data-idx'));
    var r = _routeData.order_routes[idx];
    if (r) {
      r.name = inp.value.trim();
      r.condition = r.condition || {};
      var fieldEl = document.querySelector('.route-rule-field[data-idx="' + idx + '"]');
      var patternEl = document.querySelector('.route-rule-pattern[data-idx="' + idx + '"]');
      var deptEl = document.querySelector('.route-rule-dept[data-idx="' + idx + '"]');
      if (fieldEl) r.condition.field = fieldEl.value;
      if (patternEl) r.condition.pattern = patternEl.value.trim();
      if (deptEl) r.process_dept = deptEl.value || '';
      // 收集产线模板勾选
      var ft = [];
      document.querySelectorAll('.route-rule-ft[data-idx="' + idx + '"]').forEach(function(cb) {
        if (cb.checked) ft.push(cb.getAttribute('data-dept'));
      });
      r.flow_template = ft.length > 0 ? ft : undefined;
    }
  });
  apiFetch('/api/perm/route_save', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(_routeData)
  }).then(function(data) {
    var msgEl = document.getElementById('routeSaveMsg');
    if (data.success) {
      msgEl.style.color = '#52c41a';
      msgEl.textContent = '✅ ' + (data.message || '保存成功');
    } else {
      msgEl.style.color = '#ff4d4f';
      msgEl.textContent = '❌ ' + (data.message || '保存失败');
    }
  }).catch(function(e) {
    document.getElementById('routeSaveMsg').style.color = '#ff4d4f';
    document.getElementById('routeSaveMsg').textContent = '❌ 保存失败：' + e.message;
  });
}

function searchPlatformProducts() {
  var shop = document.getElementById('ppShop').value;
  var pid = document.getElementById('ppPid').value.trim();
  var specId = document.getElementById('ppSpecId').value.trim();
  var specName = document.getElementById('ppSpecName').value.trim();
  if (!shop && !pid && !specId && !specName) {
    document.getElementById('ppResult').innerHTML = '<div style="padding:20px;text-align:center;color:#999;">请至少输入一个搜索条件</div>';
    return;
  }
  document.getElementById('ppResult').innerHTML = '<div style="padding:20px;text-align:center;color:#999;">⏳ 查询中...</div>';
  document.getElementById('ppPagination').style.display = 'none';
  var params = new URLSearchParams({ page: ppPage, per_page: ppPerPage });
  if (shop) params.set('shop', shop);
  if (pid) params.set('product_id', pid);
  if (specId) params.set('spec_id', specId);
  if (specName) params.set('spec_name', specName);
  apiFetch('/api/platform_products?' + params.toString()).then(function(data) {
    if (!data.success) { throw new Error(data.error || '查询失败'); }

    document.getElementById('ppResult').innerHTML = '<div style="padding:20px;text-align:center;color:#e74c3c;">❌ ' + e.message + '</div>';

  if (!rows || rows.length === 0) {

  Promise.all([
    apiFetch('/api/categories'),

  ]).then(function(results) {

    var ordRes = results[3];

    var f = orderFilters;
    var csOpts = '<option value="">全部客服</option>' + csStaffCache.map(function(s) {
      return '<option value="' + s.id + '"' + (String(f.cs_staff_id) === String(s.id) ? ' selected' : '') + '>' + esc(s.employee_name) + '</option>';
    }).join('');
    var custOpts = '<option value="">全部客户</option>' + customersCache.map(function(c) {
      return '<option value="' + c.id + '"' + (String(f.customer_id) === String(c.id) ? ' selected' : '') + '>' + esc(c.name) + '</option>';
    }).join('');
    var html = '<div class="card"><h2>订单总览 <span style="font-size:13px;color:#888;font-weight:400;">共 ' + total + ' 条</span></h2>' +
      '<div class="toolbar">' +
      '<select id="ordStatus"><option value="">全部状态</option>' +
      Object.keys(STATUS_LABELS).map(function(k) {
        return '<option value="' + k + '"' + (f.status === k ? ' selected' : '') + '>' + STATUS_LABELS[k] + '</option>';
      }).join('') + '</select>' +
      '<select id="ordCs">' + csOpts + '</select>' +
      '<label style="font-size:12px;display:inline-flex;align-items:center;gap:4px;"><input type="checkbox" id="ordCsUnassigned"' + (f.cs_include_unassigned ? ' checked' : '') + '> 含未指派</label>' +
      '<select id="ordCustomer">' + custOpts + '</select>' +
      '<input type="date" id="ordDateFrom" value="' + esc(f.date_from) + '" title="开始日期">' +
      '<input type="date" id="ordDateTo" value="' + esc(f.date_to) + '" title="结束日期">' +
      '<input id="ordKw" placeholder="单号/客户/SKU/客服/备注" value="' + esc(f.keyword) + '">' +
      '<button onclick="searchOrders()">筛选</button>' +
      '<button class="btn secondary" onclick="resetOrderFilters()">重置</button>' +
      '<button onclick="editOrder(null)">+ 新建订单</button>' +
      '</div><div class="perm-table-wrap"><table><thead><tr><th>单号</th><th>时间</th><th>客户</th><th>客服</th><th>分类</th><th>规格</th><th>数量</th><th>金额</th><th>SKU</th><th>商品名</th><th>状态</th><th>操作</th></tr></thead><tbody id="ordTbody">';
    html += renderOrderRows(orders) + '</tbody></table></div></div><div id="ordFormArea"></div>';
    document.getElementById('mainContent').innerHTML = html;
  });
}

function buildOrdersUrl() {
  var f = orderFilters;
  var url = '/api/orders?limit=200';
  if (f.status) url += '&status=' + encodeURIComponent(f.status);
  if (f.cs_staff_id) url += '&cs_staff_id=' + encodeURIComponent(f.cs_staff_id);
  if (f.cs_include_unassigned) url += '&cs_include_unassigned=1';
  if (f.customer_id) url += '&customer_id=' + encodeURIComponent(f.customer_id);
  if (f.date_from) url += '&date_from=' + encodeURIComponent(f.date_from);
  if (f.date_to) url += '&date_to=' + encodeURIComponent(f.date_to);
  if (f.keyword) url += '&keyword=' + encodeURIComponent(f.keyword);
  return url;
}

function resetOrderFilters() {
  orderFilters = { status: '', cs_staff_id: '', customer_id: '', keyword: '', date_from: '', date_to: '', cs_include_unassigned: false };
  loadOrders();
}

function fmtOrderTime(t) {
  if (!t) return '—';
  return String(t).replace('T', ' ').slice(0, 16);
}

function renderOrderRows(items) {
  if (!items.length) return '<tr><td colspan="12" class="empty">暂无订单</td></tr>';
  return items.map(function(o) {
    var spec = o.length + '×' + o.width + '×' + o.height + (o.material ? ' ' + o.material : '');
    var skuTitle = o.sku_title || o.sku_spec_alias || '';
    return '<tr><td><code>' + esc(o.order_no) + '</code></td><td style="font-size:12px;color:#666;">' + fmtOrderTime(o.created_at) + '</td>' +
      '<td>' + esc(o.customer_name) + '</td><td>' + esc(o.cs_name || '—') + '</td>' +
      '<td>' + esc(o.category_name || o.product_category_code) + '</td>' +
      '<td>' + esc(spec) + '</td><td>' + o.qty + '</td><td>' + (o.total_price || 0) + '</td>' +
      '<td><code style="font-size:11px;">' + esc(o.outer_id || '-') + '</code></td>' +
      '<td style="font-size:12px;max-width:140px;overflow:hidden;text-overflow:ellipsis;" title="' + esc(skuTitle) + '">' + esc(skuTitle || '—') + '</td>' +
      '<td>' + statusTag(o.status) + '</td>' +
      '<td><button class="btn secondary" onclick="editOrder(' + o.id + ')">编辑</button></td></tr>';
  }).join('');
}

function searchOrders() {
  orderFilters.status = document.getElementById('ordStatus').value;
  orderFilters.cs_staff_id = document.getElementById('ordCs').value;
  orderFilters.cs_include_unassigned = document.getElementById('ordCsUnassigned').checked;
  orderFilters.customer_id = document.getElementById('ordCustomer').value;
  orderFilters.date_from = document.getElementById('ordDateFrom').value;
  orderFilters.date_to = document.getElementById('ordDateTo').value;
  orderFilters.keyword = document.getElementById('ordKw').value.trim();
  apiFetch(buildOrdersUrl()).then(function(d) {
    if (!d.success) return;
    var card = document.querySelector('.card h2');
    if (card) card.innerHTML = '订单总览 <span style="font-size:13px;color:#888;font-weight:400;">共 ' + (d.total || 0) + ' 条</span>';
    document.getElementById('ordTbody').innerHTML = renderOrderRows(d.items || []);
  });

function matchSkuPreview() {
  apiFetch('/api/sku/match', { method: 'POST', body: JSON.stringify({
    product_category_code: document.getElementById('oCategory').value,
    length: parseFloat(document.getElementById('oLen').value) || 0,
    width: parseFloat(document.getElementById('oWid').value) || 0,
    height: parseFloat(document.getElementById('oHei').value) || 0,
    material: document.getElementById('oMat').value.trim(),
    dim_kind: document.getElementById('oDim').value
  })}).then(function(d) {
    var el = document.getElementById('matchPreview');
    if (!d.matched) {
      el.innerHTML = '<div class="match-box none">未在 km_sku_map 中找到匹配（小程序阶段可自动新建）</div>';
      return;
    }
    var m = d.match;
    el.innerHTML = '<div class="match-box">已匹配：<strong>' + esc(m.outer_id) + '</strong> · ' +
      esc(m.km_title || m.spec_alias) + ' · ' + m.length + '×' + m.width + '×' + m.height + '</div>';
  });
}

function searchSkuMap() {
  var kw = document.getElementById('skuKw').value.trim();
  var oid = document.getElementById('skuOid').value.trim();
  var pt = document.getElementById('skuType').value;
  if (!kw && !oid && !pt) { toast('请输入至少一个搜索条件'); return; }
  var st = document.getElementById('skuSearchStat');
  if (st) st.textContent = '搜索中…';
  var url = '/api/admin/km_sku/search?limit=100';
  if (kw) url += '&keyword=' + encodeURIComponent(kw);
  if (oid) url += '&outer_id=' + encodeURIComponent(oid);
  if (pt) url += '&product_type=' + encodeURIComponent(pt);
  apiFetch(url).then(function(d) {
    if (st) st.textContent = d.success ? ('共 ' + (d.total || 0) + ' 条，显示前 ' + (d.items || []).length + ' 条') : '搜索失败';
    document.getElementById('skuTbody').innerHTML = renderSkuRows(d.items || []);
  });
}

function renderSkuRows(items) {
  if (!items.length) return '<tr><td colspan="7" class="empty">无结果</td></tr>';
  return items.map(function(r) {
    var dims = r.length + '×' + r.width + '×' + r.height + (r.dim_kind ? ('(' + r.dim_kind + ')') : '');
    return '<tr><td><code>' + esc(r.outer_id) + '</code></td><td style="font-size:12px;">' + esc(r.km_title || '—') + '</td>' +
      '<td style="font-size:12px;">' + esc(r.spec_alias || '—') + '</td><td>' + esc(r.product_type || '—') + '</td>' +
      '<td>' + esc(dims) + '</td><td>' + esc(r.material || '—') + '</td>' +
      '<td><button class="btn secondary" onclick="showSkuEditForm(' + JSON.stringify(r.outer_id) + ')">编辑</button></td></tr>';
  }).join('');
}

function showSkuEditForm(outerId) {
  var loadP = outerId ? apiFetch('/api/admin/km_sku/search?outer_id=' + encodeURIComponent(outerId) + '&limit=1') : Promise.resolve({ items: [] });
  loadP.then(function(d) {
    var r = (d.items && d.items[0]) || { outer_id: outerId || '', spec_alias: '', product_type: 'zhengsquare', length: 0, width: 0, height: 0, dim_kind: 'outer', material: '', km_title: '' };
    document.getElementById('skuFormArea').innerHTML =
      '<div class="card"><h2>' + (outerId ? '编辑 SKU 映射' : '新增 SKU 映射') + '</h2>' +
      '<div class="form-grid">' +
      field('商家编码 outer_id', 'skOid', r.outer_id, '必填', outerId ? 'readonly' : '') +
      field('快麦简称', 'skTitle', r.km_title || '') +
      field('规格别名', 'skAlias', r.spec_alias || '') +
      selectField('产品分类', 'skType', r.product_type || 'zhengsquare', [
        {v:'zhengsquare',l:'飞机盒'},{v:'koudi',l:'扣底'},{v:'shuangcha',l:'双插'},{v:'juxing',l:'纸箱'},{v:'daikou',l:'带扣'},{v:'zhenzhenmian',l:'珍珠棉'}
      ]) +
      field('长', 'skL', r.length, '', 'number') +
      field('宽', 'skW', r.width, '', 'number') +
      field('高', 'skH', r.height, '', 'number') +
      selectField('尺寸类型', 'skDim', r.dim_kind || 'outer', [{v:'outer',l:'外径'},{v:'inner',l:'内径'},{v:'',l:'未指定'}]) +
      field('材质', 'skMat', r.material || '') +
      '</div><div class="form-actions">' +
      '<button class="btn" onclick="saveSkuRow()">保存到 km_sku_map</button>' +
      '<button class="btn secondary" onclick="document.getElementById(\'skuFormArea\').innerHTML=\'\'">取消</button></div></div>';
    if (outerId) {
      var el = document.getElementById('skOid');
      if (el) el.readOnly = true;
    }
  });
}

function saveSkuRow() {
  var data = {
    outer_id: document.getElementById('skOid').value.trim(),
    km_title: document.getElementById('skTitle').value.trim(),
    spec_alias: document.getElementById('skAlias').value.trim(),
    product_type: document.getElementById('skType').value,
    length: parseFloat(document.getElementById('skL').value) || 0,
    width: parseFloat(document.getElementById('skW').value) || 0,
    height: parseFloat(document.getElementById('skH').value) || 0,
    dim_kind: document.getElementById('skDim').value,
    material: document.getElementById('skMat').value.trim()
  };
  if (!data.outer_id) { toast('商家编码必填'); return; }
  apiFetch('/api/admin/km_sku/save', { method: 'POST', body: JSON.stringify(data) })
    .then(function(d) {
      if (d.success) {
        toast('SKU 已保存');
        document.getElementById('skuFormArea').innerHTML = '';
        document.getElementById('skuOid').value = data.outer_id;
        document.getElementById('skuKw').value = '';
        searchSkuMap();
      } else toast(d.error || '保存失败');
    });
}

function loadPermissions() {
  if (currentUser.role !== 'admin') { toast('无权限'); return; }
  Promise.all([
    apiFetch('/api/admin_users'),
    apiFetch('/api/perm/data'),
    apiFetch('/api/perm/users'),
    apiFetch('/api/admin/sync_km_sku/status')
  ]).then(function(results) {
    window._adminUsers = (results[0].items || []);
    window._permBundle = (results[1].data || {});
    normalizePermProcesses(window._permBundle);

  var st = window._kmSkuStatus || {};

    syncHint = '<p style="color:#27ae60;font-size:13px;margin-bottom:8px;">✅ 断点 next_page=1 且已写入行数 ≥ 表行数，通常表示<strong>全量同步已完成</strong>（非卡住）。</p>';

    field('手机号', 'fePhone', e.phone || '') +

function saveFullEmployeeFromForm() {
  var payload = {
    name: document.getElementById('feName').value.trim(),
    position: document.getElementById('fePos').value.trim(),
    group: document.getElementById('feGroup').value.trim(),
    phone: document.getElementById('fePhone').value.trim(),
    dept: document.getElementById('feDept').value
  };
  if (!payload.name) { toast('姓名不能为空'); return; }
  var url = editingEmpOldName ? '/api/employee/update' : '/api/employee/add';
  if (editingEmpOldName) payload.old_name = editingEmpOldName;
  apiFetch(url, { method: 'POST', body: JSON.stringify(payload) })
    .then(function(d) {
      if (!d.success) { toast(d.message || d.error || '保存失败'); return; }
      toast((d.message || '已保存') + '；可在「登录账号」开通登录');
      editingEmpOldName = '';
      document.getElementById('admFormArea').innerHTML = '';
      renderPermFullEmployees();
      window._loginAccountsCache = null;
    })
    .catch(function(err) { toast(err.message || '网络错误'); });
}

      Object.keys(mats).forEach(function(k) {
        var mat = mats[k];
        html += '<div><label>' + esc(mat.name || k) + '</label>' +
          '<input type="number" class="cfg-price" data-group="' + g.key + '" data-key="' + esc(k) + '" step="0.01" value="' + (mat.price || 0) + '"></div>';

function savePermQuote() {
  var patch = { profit: {}, materials: {} };
  patch.profit.retail_multiplier = parseFloat(document.getElementById('cfgRetailMult').value) || 2;
  patch.profit.redline_multiplier = parseFloat(document.getElementById('cfgRedlineMult').value) || 1.35;
  document.querySelectorAll('.cfg-price').forEach(function(input) {
    var group = input.getAttribute('data-group');
    var key = input.getAttribute('data-key');
    if (!patch.materials[group]) patch.materials[group] = { materials: {} };
    if (!patch.materials[group].materials[key]) patch.materials[group].materials[key] = {};
    patch.materials[group].materials[key].price = parseFloat(input.value) || 0;
  });
  var st = document.getElementById('cfgSaveStatus');
  if (st) st.textContent = '保存中…';
  apiFetch('/api/quote/save_config', { method: 'POST', body: JSON.stringify(patch) })
    .then(function(d) {
      if (st) st.textContent = d.success ? '✅ 已保存' : ('❌ ' + (d.error || '失败'));
      if (d.success) toast('报价参数已保存');
    });
}

window._shopSaveQueue = window._shopSaveQueue || Promise.resolve();

function enqueueShopSave(task) {
  window._shopSaveQueue = window._shopSaveQueue.then(task).catch(function(e) {
    toast(e.message || '保存失败');
  });
  return window._shopSaveQueue;
}

function patchShopCacheItem(id, patch) {
  if (!window._shopConfigCache) return;
  var row = window._shopConfigCache.find(function(c) { return c.id === id; });
  if (row) Object.keys(patch || {}).forEach(function(k) { row[k] = patch[k]; });
}

function updateShopKefu(id, val) {
  var st = document.getElementById('shopSaveStatus');
  if (st) st.textContent = '保存中…';
  enqueueShopSave(function() {
    return apiFetch('/api/shop-config/' + encodeURIComponent(id), {
      method: 'PUT',
      body: JSON.stringify({ customer_service: val })
    }).then(function(d) {
      if (d.success) {
        patchShopCacheItem(id, { customer_service: val });
        if (st) st.textContent = '✅ 已保存';
      } else {
        if (st) st.textContent = '❌ ' + (d.error || '失败');
        toast(d.error || '保存失败');
      }
    });
  });
}

function updateShopOrder(id, val) {
  var n = parseInt(val, 10) || 0;
  enqueueShopSave(function() {
    return apiFetch('/api/shop-config/' + encodeURIComponent(id), {
      method: 'PUT',
      body: JSON.stringify({ sort_order: n })
    }).then(function(d) {
      if (d.success) patchShopCacheItem(id, { sort_order: n });
      else toast(d.error || '保存失败');
    });
  });
}

function deleteShopRow(id) {

    .then(function(d) {

function savePermMatrix() {
  var data = window._permBundle || {};
  var features = window._permFeatures || [];
  var employees = [];
  document.querySelectorAll('[data-emp-pos]').forEach(function(el) {
    var name = el.getAttribute('data-emp-pos');
    employees.push({ name: name, position: el.value.trim() });
  });
  var permissions = {};
  var employee_enabled = {};
  document.querySelectorAll('[data-emp-en]').forEach(function(el) {
    employee_enabled[el.getAttribute('data-emp-en')] = el.checked;
  });
  employees.forEach(function(e) { permissions[e.name] = {}; });
  document.querySelectorAll('[data-emp][data-feat]').forEach(function(el) {
    var n = el.getAttribute('data-emp');
    var f = el.getAttribute('data-feat');
    if (!permissions[n]) permissions[n] = {};
    permissions[n][f] = el.checked;
  });
  savePermBundlePatch({
    employees: employees,
    permissions: permissions,
    employee_enabled: employee_enabled
  }, '员工功能权限已保存');
}

function normalizePermProcesses(data) {
  if (!data || !Array.isArray(data.processes)) { if (data) data.processes = []; return; }
  if (data.processes.length > 0 && typeof data.processes[0] === 'string') {
    data.processes = [{ dept: '美丽湾工厂部', steps: data.processes.map(function(s, i) { return { id: i + 1, name: s }; }) }];
  }
}

function savePermBundlePatch(patch, okMsg) {
  var data = window._permBundle || {};
  var payload = {
    employees: data.employees,
    permissions: data.permissions,
    employee_enabled: data.employee_enabled,
    processes: data.processes,
    positions: data.positions,
    role_permissions: data.role_permissions,
    employee_roles: data.employee_roles,
    production_material_mapping: data.production_material_mapping,
    process_timeouts: data.process_timeouts
  };
  Object.keys(patch || {}).forEach(function(k) { payload[k] = patch[k]; });
  return apiFetch('/api/perm/save', { method: 'POST', body: JSON.stringify({ data: payload }) })
    .then(function(d) {
      if (d.success) {
        Object.keys(patch || {}).forEach(function(k) { window._permBundle[k] = patch[k]; });
        var detail = d.detail || {};
        var msg = okMsg || '已保存（MySQL + data.json + vault）';
        if (detail.vault_error) msg += ' · vault: ' + detail.vault_error;
        toast(msg);
      } else toast(d.error || '保存失败');
      return d;
    });
}

function renderPermProcessTree(processes) {
  var el = document.getElementById('permProcesses');
  if (!el) return;
  var isTree = Array.isArray(processes) && processes.length > 0 && processes[0] && processes[0].dept;
  if (!isTree) {
    el.innerHTML = (processes || []).map(function(p, i) {
      return '<div class="pos-row"><span>' + (i + 1) + '. ' + esc(typeof p === 'string' ? p : (p.name || '')) + '</span>' +
        '<button class="btn-xs red" onclick="deletePermLegacyProcess(' + i + ')">删除</button></div>';
    }).join('') || '<p class="empty" style="padding:20px;">暂无工序，点「添加部门」</p>';
    return;
  }
  var html = '';
  processes.forEach(function(dept, di) {
    html += '<div style="margin-bottom:10px;"><div class="process-dept-hd">' +
      '<span>🏭 ' + esc(dept.dept) + '</span>' +
      '<span><button class="btn-xs green" onclick="addProcessStep(' + di + ')">+ 工序</button> ' +
      '<button class="btn-xs blue" onclick="editProcessDeptName(' + di + ')">✏️</button> ' +
      '<button class="btn-xs red" onclick="deleteProcessDept(' + di + ')">🗑️</button></span></div>';
    (dept.steps || []).forEach(function(step, si) {
      var stepPos = step.positions || [];
      var posHtml = (window._permBundle.positions || []).map(function(p) {
        var checked = stepPos.indexOf(p) !== -1 ? 'checked' : '';
        return '<label style="margin:0 2px;font-size:10px;color:#888;cursor:pointer;white-space:nowrap;">' +
          '<input type="checkbox" data-di="' + di + '" data-si="' + si + '" data-pos="' + p + '" ' + checked +
          ' onchange="toggleStepPosition(this)" style="margin-right:1px;">' + p + '</label>';
      }).join('');
      var fc = (step.fields && step.fields.length) ? step.fields.length : 0;
      html += '<div class="process-step"><div><span>' + esc(step.id) + '. ' + esc(step.name) +
        (fc ? ' <span style="color:#52c41a;font-size:10px;">[' + fc + '个字段]</span>' : '') + '</span>' +
        '<span style="margin-left:6px;font-size:10px;color:#999;">岗位：</span>' +
        '<span style="display:inline-flex;flex-wrap:wrap;gap:2px;">' + posHtml + '</span></div>' +
        '<span><button class="btn-xs" style="background:#722ed1;color:#fff;border:none;padding:1px 6px;border-radius:3px;cursor:pointer;font-size:9px;" onclick="editProcessStepFields(' + di + ',' + si + ')">📋 字段</button> ' +
        '<button class="btn-xs blue" onclick="editProcessStep(' + di + ',' + si + ')">✏️</button> ' +
        '<button class="btn-xs red" onclick="deleteProcessStep(' + di + ',' + si + ')">✕</button></span></div>';
    });
    html += '</div>';
  });
  el.innerHTML = html || '<p class="empty" style="padding:20px;">暂无工序，点「添加部门」</p>';
}

function addProcessDept() {
  var name = prompt('请输入新部门名称（如：手啤机工序）：');
  if (!name || !name.trim()) return;
  if (!window._permBundle) return;
  if (!window._permBundle.processes) window._permBundle.processes = [];
  window._permBundle.processes.push({ dept: name.trim(), steps: [] });
  renderPermProcessTree(window._permBundle.processes);

  var name = prompt('修改部门名称：', dept.dept);

  dept.dept = name.trim();

function addProcessStep(di) {
  var name = prompt('请输入工序名称（如：算料）：');
  if (!name || !name.trim()) return;

function _saveFieldsVisual(di, si) {

  if (!step) return;
  var fields = [];
  for (var i = 0; i < rows.length; i++) {
    var key = rows[i].querySelector('._sfKey').value.trim();
    var label = rows[i].querySelector('._sfLabel').value.trim();
    if (!key || !label) continue;
    fields.push({
      key: key,
      label: label,
      type: rows[i].querySelector('._sfType').value,

function editPermPositionName(idx) {
  var item = window._permBundle.positions[idx];
  if (!item) return;
  var name = prompt('修改角色名称：', item);
  if (!name || !name.trim() || name.trim() === item) return;
  var old = item;
  window._permBundle.positions[idx] = name.trim();
  var er = window._permBundle.employee_roles || {};
  Object.keys(er).forEach(function(k) { if (er[k] === old) er[k] = name.trim(); });
  var rp = window._permBundle.role_permissions || {};
  if (rp[old]) { rp[name.trim()] = rp[old]; delete rp[old]; }
  if (selectedRoleForEdit === idx) { /* keep idx */ }
  renderPermPositionList(window._permBundle.positions);
  renderRolePermEditor(selectedRoleForEdit);

function addPermPosition() {
  var name = prompt('请输入新角色名称（如：客服、员工）：');
  if (!name || !name.trim()) return;
  if (!window._permBundle.positions) window._permBundle.positions = [];
  window._permBundle.positions.push(name.trim());
  selectedRoleForEdit = window._permBundle.positions.length - 1;
  renderPermPositionList(window._permBundle.positions);
  renderRolePermEditor(selectedRoleForEdit);
}

function deletePermPosition(idx) {
  var item = window._permBundle.positions[idx];
  if (!item || !confirm('确认删除角色「' + item + '」？')) return;
  window._permBundle.positions.splice(idx, 1);
  var er = window._permBundle.employee_roles || {};
  Object.keys(er).forEach(function(k) { if (er[k] === item) er[k] = ''; });
  if (window._permBundle.role_permissions) delete window._permBundle.role_permissions[item];
  if (selectedRoleForEdit >= window._permBundle.positions.length) {
    selectedRoleForEdit = Math.max(0, window._permBundle.positions.length - 1);
  }
  renderPermPositionList(window._permBundle.positions);
  renderRolePermEditor(selectedRoleForEdit);
}

    employee_roles: window._permBundle.employee_roles || {}
  }, '岗位与角色已保存').then(function(d) {
    if (d && d.success) window._permEmployeeRolesCache = copyJson(window._permBundle.employee_roles || {});

function copyJson(obj) {

}

function collectMaterialMappingRows() {
  var rows = [];
  document.querySelectorAll('#matMappingBody tr').forEach(function(tr) {
    if (tr.querySelector('.empty')) return;
    var mat = tr.querySelector('.map-material');
    var grp = tr.querySelector('.map-group');
    var kw = tr.querySelector('.map-keywords');
    if (mat && grp && kw) {
      var name = (mat.value || '').trim();
      rows.push({
        material_key: (mat.getAttribute('data-key') || name || 'custom').trim(),
        material_name: name,
        group: (grp.value || '').trim(),
        keywords: (kw.value || '').trim()
      });
    }
  });
  return rows;
}

function savePermMaterialMap() {
  var st = document.getElementById('matMapSaveStatus');
  if (st) st.textContent = '保存中…';
  var mappingRows = collectMaterialMappingRows();
  apiFetch('/api/perm/material_mapping/save', { method: 'POST', body: JSON.stringify({ material_mapping: mappingRows }) })
    .then(function(d) {
      var msg = d.success
        ? ('✅ ' + (d.message || '已保存'))
        : ('❌ ' + (d.error || d.message || '失败'));
      if (st) st.textContent = msg;
      if (d.success) {
        toast(d.message || '材料映射已保存');
        var saved = d.material_mapping || mappingRows;
        window._materialMappingRows = saved;
        fillMaterialMappingBody(saved);
        if (window._quoteDataCache) window._quoteDataCache.material_mapping = saved;
      } else {
        toast(d.error || d.message || '保存失败');
      }
    })
    .catch(function(err) {
      if (st) st.textContent = '❌ ' + (err.message || '网络错误');
      toast(err.message || '网络错误');
    });
}

function esc(s) {
  if (s == null) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function tryRestoreSession() {
  if (window.__SY_PREAUTH && window.__SY_PREAUTH.username) {
    currentUser = window.__SY_PREAUTH;
    if (globalThis.SY_AUTH) {
      SY_AUTH.saveAuthCredentials(currentUser.username, currentUser.auth_token);
    }
    showApp();
    var route = (globalThis.SY_AUTH && SY_AUTH.readRoute) ? SY_AUTH.readRoute() : { top: 'dashboard', sub: null };
    switchPage(route.top === 'main' ? 'dashboard' : (route.top || 'dashboard'));
    return;
  }
  if (!globalThis.SY_AUTH) {
    location.href = '/guanli/login';
    return;
  }
  SY_AUTH.apiFetch('/api/me').then(function(res) {
    return SY_AUTH.parseLoginResponse(res);
  }).then(function(r) {
    var d = r.data || {};
    if (r.ok && d.success && d.user) {
      currentUser = d.user;
      SY_AUTH.saveAuthCredentials(d.user.username, d.user.auth_token);
      showApp();
      var route = SY_AUTH.readRoute();
      switchPage(route.top === 'main' ? 'dashboard' : (route.top || 'dashboard'));
    } else {
      SY_AUTH.clearAuthCredentials();
      location.href = '/guanli/login';
    }
  }).catch(function() {
    SY_AUTH.clearAuthCredentials();
    location.href = '/guanli/login';
  });
}

function loadReportSummary() {

    document.getElementById('rTodayScanCount').textContent = data.today_scan_count != null ? data.today_scan_count : '—';
    document.getElementById('rTodayWorkers').textContent = data.today_workers != null ? data.today_workers : '—';
    document.getElementById('rTodayCompleted').textContent = data.today_completed_orders != null ? data.today_completed_orders : '—';
    document.getElementById('rPendingOrders').textContent = data.pending_orders != null ? data.pending_orders : '—';
    document.getElementById('rMonthOrders').textContent = data.month_orders != null ? data.month_orders : '—';

function loadReportTrend() {
  var days = document.getElementById('reportTrendDays').value || 30;
  apiFetch('/api/report/trend?days=' + days).then(function(d) {
    if (!d.success && d.error) throw new Error(d.error);
    var data = d.data || d;
    if (!Array.isArray(data)) data = data.list || data.trend || [];
    var chartEl = document.getElementById('reportTrendChart');
    if (!data.length) {
      chartEl.innerHTML = '<p class="empty">暂无趋势数据</p>';
      return;
    }
    // 计算最大值用于条形图比例
    var maxOrders = 1, maxScan = 1;
    data.forEach(function(row) {
      if (row.orders_count > maxOrders) maxOrders = row.orders_count;
      if (row.scan_count > maxScan) maxScan = row.scan_count;
    });
    var barMaxH = 120;
    var html = '<div style="overflow-x:auto;"><table style="font-size:12px;border-collapse:collapse;width:100%;">' +
      '<thead><tr style="background:#fafafa;">' +
        '<th style="padding:6px 8px;border:1px solid #eee;text-align:center;">日期</th>' +
        '<th style="padding:6px 8px;border:1px solid #eee;text-align:center;">订单数</th>' +
        '<th style="padding:6px 8px;border:1px solid #eee;text-align:center;">报工次数</th>' +
        '<th style="padding:6px 8px;border:1px solid #eee;text-align:center;">员工数</th>' +
      '</tr></thead><tbody>';
    data.forEach(function(row) {
      var ordersPct = (row.orders_count / maxOrders * 100).toFixed(1);
      var scanPct = (row.scan_count / maxScan * 100).toFixed(1);
      html += '<tr>' +
        '<td style="padding:6px 8px;border:1px solid #eee;text-align:center;white-space:nowrap;">' + esc(row.date || '') + '</td>' +
        '<td style="padding:6px 8px;border:1px solid #eee;">' +
          '<div style="display:flex;align-items:center;gap:6px;">' +
            '<div style="width:100px;height:18px;background:#f0f0f0;border-radius:3px;overflow:hidden;">' +
              '<div style="height:100%;width:' + ordersPct + '%;background:#2980b9;border-radius:3px;transition:width .3s;"></div>' +
            '</div>' +
            '<span>' + (row.orders_count || 0) + '</span>' +
          '</div>' +
        '</td>' +
        '<td style="padding:6px 8px;border:1px solid #eee;">' +
          '<div style="display:flex;align-items:center;gap:6px;">' +
            '<div style="width:100px;height:18px;background:#f0f0f0;border-radius:3px;overflow:hidden;">' +
              '<div style="height:100%;width:' + scanPct + '%;background:#27ae60;border-radius:3px;transition:width .3s;"></div>' +
            '</div>' +
            '<span>' + (row.scan_count || 0) + '</span>' +
          '</div>' +
        '</td>' +
        '<td style="padding:6px 8px;border:1px solid #eee;text-align:center;">' + (row.workers_count || 0) + '</td>' +
      '</tr>';
    });
    html += '</tbody></table></div>';
    chartEl.innerHTML = html;
  }).catch(function(e) {
    document.getElementById('reportTrendChart').innerHTML = '<p class="empty">❌ 趋势加载失败: ' + esc(e.message) + '</p>';
  });
}

// ===== 生产工单页面 =====
var _workorderData = null;

function loadWorkorder() {
  var html =
    '<div style="padding:4px 0;">' +
      '<h3 style="font-size:18px;margin-bottom:16px;">📋 生产工单</h3>' +
      // 工单查询
      '<div class="card">' +
        '<h2>🔍 工单查询</h2>' +
        '<div class="toolbar">' +
          '<input type="text" id="woSearchInput" placeholder="输入订单ID或SO编号" style="width:280px;">' +
          '<button onclick="searchWorkorder()">查询</button>' +
        '</div>' +
        '<div id="woResult" style="margin-top:8px;"></div>' +
      '</div>' +
      // 工单打印预览
      '<div class="card">' +
        '<h2>🖨️ 工单打印</h2>' +
        '<div class="toolbar">' +
          '<input type="text" id="woPrintInput" placeholder="输入订单ID（多个用英文逗号分隔）" style="width:320px;">' +
          '<button onclick="previewWorkorderPrint()">打印预览</button>' +
          '<button onclick="printWorkorder()" style="background:#27ae60;">直接打印</button>' +
        '</div>' +
        '<div id="woPrintPreview" style="margin-top:8px;"></div>' +
      '</div>' +
    '</div>';
  document.getElementById('mainContent').innerHTML = html;
  // 监听回车
  setTimeout(function() {
    var inp = document.getElementById('woSearchInput');
    if (inp) inp.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') searchWorkorder();
    });
  }, 100);
}

function searchWorkorder() {
  var q = document.getElementById('woSearchInput').value.trim();
  if (!q) { toast('请输入订单ID或SO编号'); return; }
  var resultEl = document.getElementById('woResult');
  resultEl.innerHTML = '<p style="text-align:center;color:#999;padding:20px;">查询中...</p>';
  // 先尝试完整工单 API
  apiFetch('/api/workorder/order/' + encodeURIComponent(q))
    .then(function(d) {
      if (!d.success && d.error) throw new Error(d.error);
      var data = d.data || d;
      _workorderData = data;
      renderWorkorderDetail(data, resultEl);
    })
    .catch(function(err) {
      // 回退到简化工单 API
      apiFetch('/api/workorder/scan/' + encodeURIComponent(q))
        .then(function(d2) {
          if (!d2.success && d2.error) throw new Error(d2.error);
          var data2 = d2.data || d2;
          _workorderData = data2;
          renderWorkorderDetail(data2, resultEl);
        })
        .catch(function(err2) {
          resultEl.innerHTML = '<div class="card" style="border:1px solid #f5b7b1;background:#fef9f9;"><h2 style="color:#e74c3c;">❌ 未找到工单</h2><p style="font-size:13px;">' + esc(err2.message || '查询失败，请检查订单ID') + '</p></div>';
        });
    });
}

function renderWorkorderDetail(data, el) {
  var html = '<div style="border:1px solid #d9d9d9;border-radius:8px;padding:16px;background:#fafafa;">';
  // 基本信息
  html += '<div style="display:flex;flex-wrap:wrap;gap:16px;margin-bottom:12px;">';
  var fields = [
    { label: '订单ID', val: data.id || data.order_id || '-' },
    { label: '订单编号', val: data.order_no || data.so_id || '-' },
    { label: '客户', val: data.customer_name || data.customer || '-' },
    { label: '状态', val: data.status || data.order_status || '-' },
    { label: '创建时间', val: data.created_at || data.create_time || '-' }
  ];
  fields.forEach(function(f) {
    html += '<div style="min-width:140px;"><span style="font-size:12px;color:#888;">' + esc(f.label) + '</span><div style="font-size:14px;font-weight:600;margin-top:2px;">' + esc(f.val) + '</div></div>';
  });
  html += '</div>';

  // 工单项
  var items = data.items || data.order_items || [];
  if (items.length) {
    html += '<h4 style="font-size:14px;margin-bottom:8px;color:#1a5276;">📦 工单项</h4>' +
      '<div style="overflow-x:auto;"><table><thead><tr>' +
        '<th>商品名</th><th>规格</th><th>数量</th><th>产品类型</th><th>备注</th>' +
      '</tr></thead><tbody>';
    items.forEach(function(item) {
      html += '<tr>' +
        '<td>' + esc(item.name || item.product_name || '') + '</td>' +
        '<td>' + esc(item.spec || '') + '</td>' +
        '<td>' + (item.qty || item.quantity || 0) + '</td>' +
        '<td>' + esc(item.product_type || '') + '</td>' +
        '<td>' + esc(item.remark || item.note || '') + '</td>' +
      '</tr>';
    });
    html += '</tbody></table></div>';
  }

  // 计算/工序结果
  var calcResult = data.calc_result || data.calculation || {};
  var steps = data.steps || data.process_steps || calcResult.steps || [];
  if (steps.length) {
    html += '<h4 style="font-size:14px;margin:12px 0 8px;color:#1a5276;">⚙️ 工序信息</h4>' +
      '<div style="overflow-x:auto;"><table><thead><tr>' +
        '<th>工序</th><th>部门</th><th>说明</th>' +
      '</tr></thead><tbody>';
    steps.forEach(function(step) {
      var s = typeof step === 'string' ? { name: step } : step;
      html += '<tr>' +
        '<td>' + esc(s.name || s.step_name || '') + '</td>' +
        '<td>' + esc(s.dept || s.department || '') + '</td>' +
        '<td>' + esc(s.description || s.desc || s.note || '') + '</td>' +
      '</tr>';
    });
    html += '</tbody></table></div>';
  }

  // 操作按钮
  html += '<div class="form-actions" style="margin-top:16px;">' +
    '<button onclick="printSingleWorkorder()" style="padding:8px 20px;background:#2980b9;color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:13px;">🖨️ 打印此工单</button>' +
    '</div>';

  html += '</div>';
  el.innerHTML = html;
}

function printSingleWorkorder() {
  if (!_workorderData) { toast('请先查询工单'); return; }
  var id = _workorderData.id || _workorderData.order_id;
  if (!id) { toast('工单缺少ID'); return; }
  apiFetch('/api/workorder/print', {
    method: 'POST',
    body: JSON.stringify({ order_ids: [id] })
  }).then(function(d) {
    if (!d.success && d.error) throw new Error(d.error);
    var html = d.html || d.data || '';
    if (!html) { toast('打印内容为空'); return; }
    var win = window.open('', '_blank');
    if (!win) { toast('请允许弹出窗口'); return; }
    win.document.write('<html><head><meta charset="UTF-8"><title>工单打印</title><style>body{font-family:sans-serif;padding:20px;}table{width:100%;border-collapse:collapse;}th,td{padding:8px;border:1px solid #ccc;text-align:left;}th{background:#f5f5f5;}</style></head><body>');
    win.document.write(html);
    win.document.write('</body></html>');
    win.document.close();
    setTimeout(function() { win.print(); }, 500);
  }).catch(function(e) {
    toast('打印失败: ' + e.message);
  });
}

function previewWorkorderPrint() {
  var ids = document.getElementById('woPrintInput').value.trim();
  if (!ids) { toast('请输入订单ID'); return; }
  var idArr = ids.split(',').map(function(s) { return s.trim(); }).filter(Boolean);
  if (!idArr.length) { toast('请输入有效的订单ID'); return; }
  var previewEl = document.getElementById('woPrintPreview');
  previewEl.innerHTML = '<p style="text-align:center;color:#999;padding:20px;">加载中...</p>';
  apiFetch('/api/workorder/print', {
    method: 'POST',
    body: JSON.stringify({ order_ids: idArr })
  }).then(function(d) {
    if (!d.success && d.error) throw new Error(d.error);
    var html = d.html || d.data || '';
    if (!html) { previewEl.innerHTML = '<p class="empty">打印内容为空</p>'; return; }
    previewEl.innerHTML = '<div style="border:1px solid #d9d9d9;border-radius:6px;padding:16px;background:#fff;max-height:600px;overflow-y:auto;font-size:13px;">' + html + '</div>' +
      '<div class="form-actions" style="margin-top:8px;"><button onclick="printCurrentPreview()" style="padding:8px 20px;background:#27ae60;color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:13px;">🖨️ 打印预览内容</button></div>';
    _woPrintHtml = html;
  }).catch(function(e) {
    previewEl.innerHTML = '<p class="empty">❌ 加载失败: ' + esc(e.message) + '</p>';
  });
}

var _woPrintHtml = '';

function printCurrentPreview() {
  if (!_woPrintHtml) { toast('没有预览内容'); return; }
  var win = window.open('', '_blank');
  if (!win) { toast('请允许弹出窗口'); return; }
  win.document.write('<html><head><meta charset="UTF-8"><title>工单打印</title><style>body{font-family:sans-serif;padding:20px;}table{width:100%;border-collapse:collapse;}th,td{padding:8px;border:1px solid #ccc;text-align:left;}th{background:#f5f5f5;}</style></head><body>');
  win.document.write(_woPrintHtml);
  win.document.write('</body></html>');
  win.document.close();
  setTimeout(function() { win.print(); }, 500);
}

function printWorkorder() {
  previewWorkorderPrint();
}

tryRestoreSession();
